<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>VR Room</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
}

#enterVR{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#00c8ff;
    color:#fff;
    font-size:18px;
    font-weight:bold;
}

#info{
    position:fixed;
    top:15px;
    left:15px;
    z-index:9999;
    color:white;
    background:rgba(0,0,0,.6);
    padding:10px;
    border-radius:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div id="info">
Google Cardboard<br>
Mover cabeza para mirar
</div>

<button id="enterVR">
ENTRAR EN VR
</button>

<a-scene
    background="color:#000"
    renderer="antialias:true"
    vr-mode-ui="enabled:true"
    device-orientation-permission-ui="enabled:true">

    <a-assets>
        <a-asset-item
            id="room"
            src="./14_6_2026.glb">
        </a-asset-item>
    </a-assets>

    <!-- iluminación -->

    <a-light
        type="ambient"
        intensity="2.2">
    </a-light>

    <a-light
        type="directional"
        intensity="1.5"
        position="3 6 4">
    </a-light>

    <!-- modelo -->

    <a-entity
        id="scan"
        gltf-model="#room"
        position="0 0 0"
        rotation="0 -90 0"
        scale="1 1 1">
    </a-entity>

    <!-- pantalla principal -->

    <a-plane
        position="1.8 1.7 -2.5"
        rotation="0 20 0"
        width="2.8"
        height="1.6"
        color="#111">
    </a-plane>

    <!-- pantalla izquierda -->

    <a-plane
        position="-0.5 1.6 -2"
        rotation="0 40 0"
        width="1.8"
        height="1">
    </a-plane>

    <!-- pantalla derecha -->

    <a-plane
        position="3.5 1.6 -2"
        rotation="0 -30 0"
        width="1.8"
        height="1">
    </a-plane>

    <!-- posición aproximada de la silla -->

    <a-entity
        id="rig"
        position="0.8 1.1 -0.4">

        <a-camera
            look-controls="magicWindowTrackingEnabled:true"
            wasd-controls-enabled="false">

            <a-cursor
                color="#00ffff"
                fuse="true"
                fuse-timeout="1200">
            </a-cursor>

        </a-camera>

    </a-entity>

</a-scene>

<script>
const scene = document.querySelector('a-scene');

document
.getElementById('enterVR')
.addEventListener('click', async ()=>{

    if (
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'
    ){
        try{
            await DeviceOrientationEvent.requestPermission();
        }catch(e){}
    }

    scene.enterVR();
});
</script>

</body>
</html>
