<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Cardboard Forzado</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;}
#msg{
position:fixed;top:10px;left:10px;z-index:999;
background:rgba(0,0,0,.7);color:#fff;padding:8px 12px;
font-family:Arial;border-radius:8px;
}
</style>
</head>
<body>
<div id="msg">Modo Cardboard: coloca el teléfono en horizontal dentro del visor.</div>

<a-scene embedded vr-mode-ui="enabled:false" renderer="antialias:true">
    <a-assets>
        <a-asset-item id="room" src="./14_6_2026.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" intensity="2.5"></a-light>
    <a-light type="directional" intensity="2" position="5 10 5"></a-light>

    <a-entity gltf-model="#room" position="0 0 0" rotation="0 180 0"></a-entity>

    <a-entity position="0 0.9 0">
        <a-camera position="0 0 0" look-controls="touchEnabled:true"></a-camera>
    </a-entity>
</a-scene>

<script>
const scene=document.querySelector('a-scene');
scene.addEventListener('loaded',()=>{
  if(scene.renderer && scene.renderer.xr){
    scene.renderer.xr.enabled=false;
  }
});
</script>
</body>
</html>
