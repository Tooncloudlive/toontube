<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cardboard VR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
#a{position:fixed;top:8px;left:8px;z-index:99;color:white;background:rgba(0,0,0,.6);padding:8px;border-radius:8px;font-family:sans-serif}
</style>
</head>
<body>
<div id="a">Toca la pantalla una vez para habilitar sensores.</div>

<a-scene embedded renderer="antialias:true;colorManagement:true">
  <a-assets>
    <a-asset-item id="room" src="./14_6_2026.glb"></a-asset-item>
  </a-assets>

  <a-light type="ambient" intensity="2"></a-light>
  <a-light type="directional" intensity="1.5" position="5 10 5"></a-light>

  <a-entity gltf-model="#room" rotation="0 180 0"></a-entity>

  <a-entity id="rig" position="0 0.9 0">
      <a-camera look-controls="magicWindowTrackingEnabled:true"></a-camera>
  </a-entity>
</a-scene>

<script>
// evita problemas al rotar
screen.orientation?.lock?.("landscape").catch(()=>{});
</script>
</body>
</html>
